<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64blit homelab</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0c;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 1024px) {
            body {
                padding: 10vh 5vh;
            }
        }

        h1 {
            color: #00ffa3;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            font-size: 24px;
            flex-shrink: 0;
        }

        #agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            padding: 0 0 40px 0;
            flex-grow: 1;
        }

        .agent-card {
            background: #16161a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .agent-card:hover {
            transform: translateY(-5px);
            border-color: #00ffa3;
            box-shadow: 0 12px 32px rgba(0, 255, 163, 0.1);
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ffa3;
            box-shadow: 0 0 10px #00ffa3;
        }

        .status-working { background: #4d94ff; box-shadow: 0 0 10px #4d94ff; }
        .status-thinking { background: #bd4dff; box-shadow: 0 0 10px #bd4dff; }
        .status-error { background: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; }
        .status-idle { background: #00ffa3; box-shadow: 0 0 10px #00ffa3; }
        .status-offline { background: #444; box-shadow: none; }

        .agent-id {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            color: #00ffa3;
            word-break: break-all;
        }

        .session-name {
            font-size: 12px;
            color: #a0a0a0;
            margin-bottom: 15px;
            display: block;
            font-family: monospace;
            word-break: break-all;
        }

        .detail {
            font-size: 14px;
            margin: 8px 0;
            color: #a0a0a0;
            display: flex;
            justify-content: space-between;
        }

        .detail strong {
            color: #e0e0e0;
            font-weight: 500;
        }

        .message-box {
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            color: #d1d1d1;
            height: 150px;
            overflow-y: auto;
            border-left: 3px solid #00ffa3;
            line-height: 1.5;
            white-space: pre-wrap;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .log-line {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 4px 0;
            word-break: break-word;
        }

        .log-response {
            color: #00ffa3;
            font-weight: 500;
            background: rgba(0, 255, 163, 0.05);
            padding: 4px;
            border-radius: 4px;
            margin: 2px 0;
        }

        .log-line:last-child {
            border-bottom: none;
            color: white;
            font-weight: bold;
        }

        .timestamp {
            font-size: 11px;
            color: #555;
            margin-top: 15px;
            display: block;
            text-align: right;
        }

        .kill-btn {
            background: #2a1010;
            color: #ff4d4d;
            border: 1px solid #441111;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .kill-btn:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 10px #ff4d4d;
        }

        .chat-input-container {
            margin-top: auto;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .chat-input {
            flex-grow: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px 12px;
            color: white;
            font-size: 14px;
            width: 10px; /* Allow flex to shrink it on small screens */
        }

        .chat-input:focus {
            outline: none;
            border-color: #00ffa3;
        }

        .send-btn {
            background: #112211;
            color: #00ffa3;
            border: 1px solid #114411;
            border-radius: 4px;
            padding: 8px 15px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            white-space: nowrap;
        }

        .send-btn:hover {
            background: #00ffa3;
            color: black;
            box-shadow: 0 0 10px #00ffa3;
        }

        #nav {
            margin: 10px 0 20px 0;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: color 0.2s;
            padding: 5px 10px;
        }

        #nav a:hover {
            color: #00ffa3;
        }

        .nav-btn {
            background: rgba(255, 60, 60, 0.1);
            color: #ff4d4d;
            border: 1px solid #441111;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #ff4d4d;
            color: white;
            box-shadow: 0 0 10px #ff4d4d;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .working-pulse {
            animation: pulse 2s infinite;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        @media (max-width: 480px) {
            h1 { font-size: 20px; margin: 15px 0; }
            #nav { border-radius: 15px; width: 90%; }
            #nav a { font-size: 12px; margin: 0 5px; }
            .agent-card { padding: 15px; }
            .agent-id { font-size: 16px; }
            .detail { font-size: 13px; }
            .message-box { height: 120px; }
        }
    </style>
</head>
<body>

    <h1>🦞 64blit homelab</h1>

    <div id="nav">
        <a href="/live">Live</a>
        <a href="/terminal/">Terminal</a>
        <a href="/ide/">IDE</a>
        <a href="/agents/" style="color: #00ffa3; font-weight: bold;">Dashboard</a>
        <a href="/browser/">Browser</a>
        <a href="/ui/">Control</a>
        <div style="display: flex; align-items: center;">
            <label for="font-size" style="font-size: 11px; margin-right: 5px; color: #666;">FONT</label>
            <input type="number" id="font-size" value="16" min="8" max="48" step="2" onchange="updateTerminalFont(this.value)" 
                style="width: 45px; background: rgba(0,0,0,0.3); border: 1px solid #333; color: white; border-radius: 4px; padding: 2px; font-size: 11px;">
        </div>
        <button class="nav-btn restart-btn" onclick="restartSystem()">Restart</button>
    </div>

    <div id="agent-grid">
        <!-- Agent cards will be injected here -->
    </div>

    <script>
        async function updateAgents() {
            try {
                const response = await fetch('/api/agents');
                const agentsMap = await response.json();
                
                const grid = document.getElementById('agent-grid');
                
                // Convert map to array and sort by last update
                const sortedAgents = Object.values(agentsMap).sort((a, b) => {
                    return new Date(b.last_update) - new Date(a.last_update);
                });

                // Get existing card IDs
                const existingCards = Array.from(grid.querySelectorAll('.agent-card')).map(c => c.dataset.id);
                const currentIds = sortedAgents.map(a => a.id);

                // Update or create cards
                sortedAgents.forEach((agent, index) => {
                    let card = grid.querySelector(`.agent-card[data-id="${agent.id}"]`);
                    
                    if (!card) {
                        card = document.createElement('div');
                        card.className = 'agent-card';
                        card.dataset.id = agent.id;
                        grid.appendChild(card);
                    }

                    // Update order
                    card.style.order = index;

                    const statusClass = `status-${agent.status || 'idle'}`;
                    const isActive = agent.status === 'working' || agent.status === 'thinking';
                    const logsHtml = (agent.logs || []).map(l => {
                        const isResp = l.includes('🤖');
                        return `<div class="log-line ${isResp ? 'log-response' : ''}">${l}</div>`;
                    }).join('');

                    const html = `
                        <div class="status-badge ${statusClass} ${isActive ? 'working-pulse' : ''}"></div>
                        <span class="agent-id">${agent.id}</span>
                        <span class="session-name">${agent.session_name || ''}</span>
                        
                        <div class="detail"><strong>Status</strong> <span>${agent.status}</span></div>
                        <div class="detail"><strong>Iteration</strong> <span>${agent.iteration}</span></div>
                        <div class="detail"><strong>Current Tool</strong> <span>${agent.current_tool || 'none'}</span></div>
                        
                        <div class="message-box">${logsHtml}</div>
                        
                        <div class="chat-input-container">
                            <input type="text" class="chat-input" placeholder="Message agent..." onkeydown="if(event.key==='Enter') sendMessage('${agent.id}', this)">
                            <button class="send-btn" onclick="sendMessage('${agent.id}', this.previousElementSibling)">Send</button>
                        </div>

                        <div style="margin-top: 15px; display: flex; justify-content: flex-end;">
                            <button class="kill-btn" onclick="killAgent('${agent.id}')">Kill Agent</button>
                        </div>
                        <span class="timestamp">${new Date(agent.last_update).toLocaleString()}</span>
                    `;

                    // To avoid losing focus or text while typing, we only update parts that changed
                    const currentInput = card.querySelector('.chat-input');
                    const isFocused = currentInput === document.activeElement;
                    const currentValue = currentInput ? currentInput.value : '';

                    if (card.dataset.lastHtml !== html) {
                        card.innerHTML = html;
                        card.dataset.lastHtml = html;
                        const msgBox = card.querySelector('.message-box');
                        msgBox.scrollTop = msgBox.scrollHeight;
                        
                        if (isFocused) {
                            const newInput = card.querySelector('.chat-input');
                            newInput.value = currentValue;
                            newInput.focus();
                        }
                    }
                });

                // Remove old cards
                existingCards.forEach(id => {
                    if (!currentIds.includes(id)) {
                        const card = grid.querySelector(`.agent-card[data-id="${id}"]`);
                        if (card) card.remove();
                    }
                });

                if (sortedAgents.length === 0) {
                    if (!grid.innerHTML.includes('Initializing')) {
                        grid.innerHTML = '<p style="text-align: center; width: 100%; color: #666; padding: 40px;">Initializing agent discovery...</p>';
                    }
                }

            } catch (error) {
                console.error('Failed to fetch agents:', error);
            }
        }

        async function killAgent(id) {
            if (!confirm(`Are you sure you want to kill agent ${id}? This will delete its session file.`)) {
                return;
            }
            try {
                const response = await fetch(`/api/agents/kill?id=${id}`, { method: 'POST' });
                if (response.ok) {
                    updateAgents();
                } else {
                    alert('Failed to kill agent');
                }
            } catch (error) {
                console.error('Error killing agent:', error);
            }
        }

        async function sendMessage(id, inputElement) {
            const message = inputElement.value.trim();
            if (!message) return;

            const originalBtn = inputElement.nextElementSibling;
            originalBtn.disabled = true;
            originalBtn.innerText = '...';

            try {
                const response = await fetch('/api/agents/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, message })
                });

                if (response.ok) {
                    inputElement.value = '';
                } else {
                    alert('Failed to send message: ' + await response.text());
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Error sending message. Check console.');
            } finally {
                originalBtn.disabled = false;
                originalBtn.innerText = 'Send';
            }
        }

        async function restartSystem() {
            if (!confirm('Restart the OpenClaw Gateway? This will temporarily disconnect all agents.')) {
                return;
            }
            try {
                const response = await fetch('/api/system/restart', { method: 'POST' });
                if (response.ok) {
                    alert('OpenClaw Gateway is restarting. Agents will show offline for a few seconds.');
                } else {
                    alert('Failed to restart OpenClaw Gateway: ' + await response.text());
                }
            } catch (error) {
                console.error('Error restarting system:', error);
                alert('Error restarting system. Check console.');
            }
        }

        async function updateTerminalFont(size) {
            try {
                const response = await fetch('/api/system/terminal-font', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ font_size: size.toString() })
                });

                if (response.ok) {
                    alert('Terminal Font Size set to ' + size + 'px. Terminal is restarting.');
                } else {
                    alert('Failed to update terminal font: ' + await response.text());
                }
            } catch (error) {
                console.error('Error updating font:', error);
                alert('Error updating font. Check console.');
            }
        }

        async function initSystemConfig() {
            try {
                const response = await fetch('/api/system/config');
                if (response.ok) {
                    const config = await response.json();
                    if (config.terminal_font_size) {
                        document.getElementById('font-size').value = config.terminal_font_size;
                    }
                }
            } catch (error) {
                console.error('Failed to load system config:', error);
            }
        }

        setInterval(updateAgents, 1000);
        updateAgents();
        initSystemConfig();
    </script>
</body>
</html>
