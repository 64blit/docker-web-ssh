<!DOCTYPE html>
<html>
<head>
    <title>Live Stream (WebSocket)</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
        #stream-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }
        #stream { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            cursor: crosshair; 
            image-rendering: -webkit-optimize-contrast;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            outline: none;
        }
        #status { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            color: #888; 
            background: rgba(0,0,0,0.8); 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: bold;
            pointer-events: none; 
            z-index: 10; 
            border: 1px solid #333;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .status-live { color: #00ffa3 !important; border-color: #00ffa344 !important; }
        .status-error { color: #ff4d4d !important; border-color: #ff4d4d44 !important; }
        
        #controls-hint { 
            position: absolute; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            color: #666; 
            background: rgba(0,0,0,0.8); 
            padding: 6px 18px; 
            border-radius: 20px; 
            font-size: 10px; 
            pointer-events: none; 
            z-index: 10; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid #222;
        }

        #top-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        #top-controls select, #top-controls button {
            background: rgba(26, 26, 26, 0.8);
            color: #00ffa3;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            outline: none;
        }
        #top-controls button:hover { background: #00ffa3; color: #000; }
        
        #mobile-kbd-trigger {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
        }

        /* Trackpad Styles */
        #trackpad {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 250px;
            height: 180px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            z-index: 100;
            display: none; /* Shown via JS or media query */
            touch-action: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #trackpad-header {
            height: 30px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            cursor: move;
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #trackpad-area {
            flex-grow: 1;
            height: calc(100% - 30px);
            position: relative;
        }

        .resize-handle {
            position: absolute;
            width: 15px;
            height: 15px;
            background: rgba(0, 255, 163, 0.2);
            bottom: 0;
            right: 0;
            cursor: nwse-resize;
            border-radius: 0 0 12px 0;
        }

        @media (max-width: 1024px) {
            #trackpad { display: block; }
        }
    </style>
</head>
<body>
    <div id="status">CONNECTING...</div>
    <audio id="audio-stream" style="display: none;"></audio>
    <input type="text" id="mobile-kbd-trigger" autocomplete="off" autocapitalize="off">
    <div id="top-controls">
        <select id="quality-sel" onchange="connect()">
            <option value="2">Quality: High</option>
            <option value="5" selected>Quality: Med</option>
            <option value="15">Quality: Low</option>
            <option value="30">Quality: Mobile</option>
        </select>
        <select id="fps-sel" onchange="connect()">
            <option value="60">60 FPS</option>
            <option value="30">30 FPS</option>
            <option value="20" selected>20 FPS</option>
            <option value="10">10 FPS</option>
            <option value="5">5 FPS</option>
        </select>
        <button id="trackpad-toggle" onclick="toggleTrackpad()">TRACKPAD</button>
        <button id="refresh-btn" onclick="connect()">RECONNECT</button>
        <button id="mute-btn" onclick="toggleMute()">MUTE</button>
        <button id="fullscreen-btn" onclick="toggleFullscreen()">FULLSCREEN</button>
        <button id="kbd-btn" onclick="triggerKeyboard()">KEYBOARD</button>
    </div>

    <!-- Floating Trackpad -->
    <div id="trackpad">
        <div id="trackpad-header">
            <span>Trackpad</span>
            <span style="font-size: 8px;">Drag here to move</span>
        </div>
        <div id="trackpad-area"></div>
        <div class="resize-handle"></div>
    </div>

    <div id="stream-container">
        <img id="stream" draggable="false" tabindex="0">
    </div>
    <div id="controls-hint">High-Performance WebSocket Flow • 1920x1080 Optimized</div>

    <script>
        const stream = document.getElementById('stream');
        const status = document.getElementById('status');
        const trackpad = document.getElementById('trackpad');
        const trackpadArea = document.getElementById('trackpad-area');
        const trackpadHeader = document.getElementById('trackpad-header');
        const resizeHandle = document.querySelector('.resize-handle');
        let ws = null;

        function connect() {
            if (ws) {
                ws.onclose = null;
                ws.close();
            }

            const q = document.getElementById('quality-sel').value;
            const fps = document.getElementById('fps-sel').value;
            
            localStorage.setItem('pico_live_q', q);
            localStorage.setItem('pico_live_fps', fps);

            status.innerText = 'CONNECTING...';
            status.className = '';

            const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${proto}//${location.host}/api/live/ws?fps=${fps}&scale=1280x720&q=${q}`;
            
            ws = new WebSocket(wsUrl);
            ws.binaryType = 'blob';

            const audio = document.getElementById('audio-stream');
            audio.src = '/api/live/audio?t=' + Date.now();
            audio.play().catch(e => console.log('Audio autoplay blocked'));

            ws.onopen = () => {
                status.innerText = '● LIVE';
                status.className = 'status-live';
            };

            ws.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    const url = URL.createObjectURL(event.data);
                    const oldUrl = stream.src;
                    stream.src = url;
                    if (oldUrl.startsWith('blob:')) {
                        URL.revokeObjectURL(oldUrl);
                    }
                }
            };

            ws.onclose = () => {
                status.innerText = '○ OFFLINE';
                status.className = 'status-error';
                setTimeout(connect, 2000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                status.innerText = '○ ERROR';
                status.className = 'status-error';
            };
        }

        function toggleMute() {
            const audio = document.getElementById('audio-stream');
            const btn = document.getElementById('mute-btn');
            audio.muted = !audio.muted;
            btn.innerText = audio.muted ? 'UNMUTE' : 'MUTE';
        }

        function toggleFullscreen() {
            const container = document.getElementById('stream-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.error(err));
            } else {
                document.exitFullscreen();
            }
        }

        function toggleTrackpad() {
            const isVisible = window.getComputedStyle(trackpad).display !== 'none';
            trackpad.style.display = isVisible ? 'none' : 'block';
        }

        const kbdTrigger = document.getElementById('mobile-kbd-trigger');
        function triggerKeyboard() { kbdTrigger.focus(); }

        kbdTrigger.addEventListener('input', (e) => {
            const val = kbdTrigger.value;
            if (val.length > 0) {
                for (let i = 0; i < val.length; i++) {
                    sendInput({ action: 'type', key: val[i] });
                }
                kbdTrigger.value = '';
            }
        });

        kbdTrigger.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace') { sendInput({ action: 'key', key: 'BackSpace' }); }
            else if (e.key === 'Enter') { sendInput({ action: 'key', key: 'Return' }); }
        });

        function sendInput(params) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(params));
            }
        }

        // --- Trackpad Logic ---
        let lastTouchX = 0;
        let lastTouchY = 0;
        let touchStartTime = 0;
        let isDraggingTrackpad = false;
        let isResizingTrackpad = false;
        let startX, startY, startWidth, startHeight, startLeft, startTop;

        // Draggable Trackpad
        trackpadHeader.addEventListener('touchstart', (e) => {
            isDraggingTrackpad = true;
            const touch = e.touches[0];
            startX = touch.clientX - trackpad.offsetLeft;
            startY = touch.clientY - trackpad.offsetTop;
            e.preventDefault();
        });

        // Resizable Trackpad
        resizeHandle.addEventListener('touchstart', (e) => {
            isResizingTrackpad = true;
            const touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            startWidth = trackpad.offsetWidth;
            startHeight = trackpad.offsetHeight;
            e.preventDefault();
        });

        window.addEventListener('touchmove', (e) => {
            if (isDraggingTrackpad) {
                const touch = e.touches[0];
                trackpad.style.left = (touch.clientX - startX) + 'px';
                trackpad.style.top = (touch.clientY - startY) + 'px';
                trackpad.style.bottom = 'auto';
                trackpad.style.right = 'auto';
            } else if (isResizingTrackpad) {
                const touch = e.touches[0];
                const newWidth = startWidth + (touch.clientX - startX);
                const newHeight = startHeight + (touch.clientY - startY);
                if (newWidth > 150) trackpad.style.width = newWidth + 'px';
                if (newHeight > 100) trackpad.style.height = newHeight + 'px';
            }
        });

        window.addEventListener('touchend', () => {
            isDraggingTrackpad = false;
            isResizingTrackpad = false;
        });

        // Trackpad Mouse Interaction
        trackpadArea.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                lastTouchX = e.touches[0].clientX;
                lastTouchY = e.touches[0].clientY;
                touchStartTime = Date.now();
            } else if (e.touches.length === 2) {
                lastTouchY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            }
            e.preventDefault();
        });

        trackpadArea.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                const dx = Math.round((touch.clientX - lastTouchX) * 1.5); // Sensitivity
                const dy = Math.round((touch.clientY - lastTouchY) * 1.5);
                
                if (Math.abs(dx) > 0 || Math.abs(dy) > 0) {
                    sendInput({ action: 'rel_move', x: dx.toString(), y: dy.toString() });
                }
                
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            } else if (e.touches.length === 2) {
                const currentY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const dy = currentY - lastTouchY;
                if (Math.abs(dy) > 10) {
                    sendInput({ action: 'scroll', y: (dy > 0 ? -1 : 1).toString() });
                    lastTouchY = currentY;
                }
            }
            e.preventDefault();
        });

        trackpadArea.addEventListener('touchend', (e) => {
            const duration = Date.now() - touchStartTime;
            if (e.changedTouches.length === 1 && duration < 200) {
                // Tap = Click
                sendInput({ action: 'click', button: '1' });
            } else if (e.touches.length === 0 && e.changedTouches.length === 2) {
                // Two finger tap = Right Click (Simplified)
                sendInput({ action: 'click', button: '3' });
            }
            e.preventDefault();
        });

        // Existing Direct Stream Interaction
        function getCoords(e) {
            const rect = stream.getBoundingClientRect();
            const nw = 1920, nh = 1080;
            const containerRatio = rect.width / rect.height;
            const imgRatio = nw / nh;
            let displayedWidth, displayedHeight, offsetX, offsetY;
            if (containerRatio > imgRatio) {
                displayedHeight = rect.height;
                displayedWidth = rect.height * imgRatio;
                offsetX = (rect.width - displayedWidth) / 2;
                offsetY = 0;
            } else {
                displayedWidth = rect.width;
                displayedHeight = rect.width / imgRatio;
                offsetY = (rect.height - displayedHeight) / 2;
                offsetX = 0;
            }
            const relativeX = e.clientX - rect.left - offsetX;
            const relativeY = e.clientY - rect.top - offsetY;
            return { 
                x: Math.max(0, Math.min(nw, Math.round(relativeX * (nw / displayedWidth)).toString())), 
                y: Math.max(0, Math.min(nh, Math.round(relativeY * (nh / displayedHeight)).toString())) 
            };
        }

        stream.addEventListener('mousedown', (e) => {
            stream.focus();
            const c = getCoords(e);
            let b = (e.button === 1) ? "2" : (e.button === 2 ? "3" : "1");
            sendInput({ action: 'mousedown', x: c.x, y: c.y, button: b });
        });

        stream.addEventListener('mouseup', (e) => {
            const c = getCoords(e);
            let b = (e.button === 1) ? "2" : (e.button === 2 ? "3" : "1");
            sendInput({ action: 'mouseup', x: c.x, y: c.y, button: b });
        });

        stream.addEventListener('contextmenu', (e) => e.preventDefault());

        window.addEventListener('keydown', (e) => {
            let key = e.key;
            if (key === ' ') key = 'space';
            else if (key === 'Control') key = 'ctrl';
            else if (key === 'Alt') key = 'alt';
            else if (key === 'Shift') key = 'shift';
            else if (key === 'Enter') key = 'Return';
            else if (key === 'Backspace') key = 'BackSpace';
            else if (key === 'ArrowUp') key = 'Up';
            else if (key === 'ArrowDown') key = 'Down';
            else if (key === 'ArrowLeft') key = 'Left';
            else if (key === 'ArrowRight') key = 'Right';

            let prefix = "";
            if (e.ctrlKey && key !== 'ctrl') prefix += "ctrl+";
            if (e.altKey && key !== 'alt') prefix += "alt+";
            if (e.shiftKey && key !== 'shift') prefix += "shift+";
            
            if (key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                sendInput({ action: 'type', key: e.key });
            } else {
                sendInput({ action: 'key', key: prefix + key });
            }
            if (key !== 'F12' && key !== 'F11') e.preventDefault();
        });

        window.addEventListener('load', () => {
            const savedQ = localStorage.getItem('pico_live_q');
            const savedFPS = localStorage.getItem('pico_live_fps');
            if (savedQ) document.getElementById('quality-sel').value = savedQ;
            if (savedFPS) document.getElementById('fps-sel').value = savedFPS;
            connect();
        });
    </script>
</body>
</html>
