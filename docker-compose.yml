services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 64blit-dashboard
    ports:
      - "18790:18790"
      - "7681:7681"
      - "8080:8080"
    environment:
      - VIRTUAL_DESKTOP=false
      - START_SPACEBOT=${START_SPACEBOT:-false}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - GEMINI_KEY=${GEMINI_KEY}
      - OPENROUTER_KEY=${OPENROUTER_KEY}
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
      - TUNNEL_NAME=${TUNNEL_NAME}
    volumes:
      - ./data/picoclaw:/home/nimda/.picoclaw
      - ./data/spacebot:/home/nimda/.spacebot
      - ./data/cloudflared:/home/nimda/.cloudflared
      - ./data/workspace:/home/nimda/workspace
    restart: always
